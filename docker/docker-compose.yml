version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amka_postgres
    environment:
      POSTGRES_USER: amka_user
      POSTGRES_PASSWORD: amka_password
      POSTGRES_DB: amka_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
